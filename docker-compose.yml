version: "3.8"

services:
  atom_ctx:
    image: ghcr.io/volcengine/atom_ctx:main
    container_name: atom_ctx
    ports:
      - "1933:1933"
    volumes:
      # Mount the configuration and data directory to persist state
      - /var/lib/atom_ctx/ctx.conf:/app/ctx.conf
      - /var/lib/atom_ctx/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    # If you need to override the default command (which runs ctx-server),
    # you can do so here. For example, to run the CLI:
    # command: ["atom_ctx", "--help"]
